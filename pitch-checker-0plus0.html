<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>음계 트레이너</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #c084fc;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e2e0f0;
    --text-dim: #6b6880;
    --text-mid: #a09cb8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .container {
    max-width: 700px; margin: 0 auto;
    padding: 40px 20px 60px;
    position: relative; z-index: 1;
  }

  /* Header */
  header { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; }
  .logo-mark {
    width: 44px; height: 44px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 22px; box-shadow: 0 0 20px rgba(124,106,247,0.35);
  }
  h1 {
    font-family: 'DM Serif Display', serif; font-size: 1.7rem; line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { font-size: 0.75rem; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; margin-top: 3px; }

  /* Start button */
  .btn-start {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 12px; color: #fff;
    font-family: 'Noto Sans KR', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: opacity 0.2s, transform 0.1s; position: relative; overflow: hidden;
  }
  .btn-start::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .btn-start:hover::before { opacity: 1; }
  .btn-start:active { transform: scale(0.99); }
  .btn-start.active { background: linear-gradient(135deg, #f87171, #fb923c); }
  .start-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.7); }
  .btn-start.active .start-dot {
    background: #fff; box-shadow: 0 0 6px #fff;
    animation: pdot 1s ease-in-out infinite;
  }
  @keyframes pdot { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5)} }

  /* Panel */
  .panel { display: none; margin-top: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
  .panel.show { display: block; }

  /* Keyboard */
  .keyboard-wrap {
    background: var(--surface2); border-bottom: 1px solid var(--border);
    padding: 20px 16px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .keyboard { display: flex; align-items: flex-end; gap: 3px; min-width: max-content; width: fit-content; margin: 0 auto; }

  .piano-key {
    width: 34px; height: 86px; border-radius: 0 0 7px 7px;
    border: 1.5px solid #252535; background: #1c1c2e;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding-bottom: 7px; cursor: pointer; flex-shrink: 0;
    transition: background 0.12s, box-shadow 0.12s, transform 0.08s;
    user-select: none; -webkit-user-select: none;
  }
  .piano-key:hover:not(.is-current):not(.is-done) { background: #252540; }
  .piano-key:active { transform: scaleY(0.95); }
  .piano-key.black-key {
    width: 24px; height: 54px; background: #0c0c1a;
    border-color: #0a0a16; z-index: 1; margin: 0 -2px;
  }
  .piano-key.black-key:hover:not(.is-current):not(.is-done) { background: #14142a; }
  .piano-key .key-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; color: #3a3a55; line-height: 1; text-align: center; pointer-events: none; }
  .piano-key.black-key .key-label { color: #2a2a45; }
  .piano-key .key-ko { font-size: 0.54rem; color: #2e2e48; margin-top: 2px; pointer-events: none; }

  .piano-key.is-current {
    background: rgba(124,106,247,0.22); border-color: var(--accent);
    box-shadow: 0 0 18px rgba(124,106,247,0.4), inset 0 0 10px rgba(124,106,247,0.15);
  }
  .piano-key.is-current .key-label { color: var(--accent2); }
  .piano-key.is-current .key-ko { color: var(--accent); }
  .piano-key.is-success { background: rgba(52,211,153,0.22); border-color: var(--green); box-shadow: 0 0 16px rgba(52,211,153,0.35); animation: kpop 0.35s ease-out; }
  .piano-key.is-fail { background: rgba(248,113,113,0.18); border-color: var(--red); animation: kshake 0.28s ease-out; }
  .piano-key.is-done { background: rgba(52,211,153,0.07); border-color: rgba(52,211,153,0.22); }
  .piano-key.is-done .key-label { color: rgba(52,211,153,0.45); }
  @keyframes kpop { 0%{transform:scaleY(1.08)} 100%{transform:scaleY(1)} }
  @keyframes kshake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

  /* Body */
  .panel-body { padding: 22px 22px 24px; display: flex; flex-direction: column; gap: 18px; }

  /* Progress dots */
  .prog-dots { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .pdot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); transition: all 0.2s; }
  .pdot.done { background: var(--green); }
  .pdot.cur { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  /* Target card */
  .target-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .nav-btn {
    width: 40px; height: 40px; flex-shrink: 0; border-radius: 50%;
    border: 1.5px solid var(--border); background: transparent; color: var(--text-dim);
    font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(192,132,252,0.08); }
  .nav-btn:active { transform: scale(0.9); }
  .nav-btn:disabled { opacity: 0.18; cursor: default; pointer-events: none; }

  .target-center { flex: 1; text-align: center; }
  .target-name {
    font-family: 'DM Serif Display', serif; font-size: 4rem; line-height: 1;
    color: var(--accent2); text-shadow: 0 0 24px rgba(192,132,252,0.35);
    transition: color 0.12s;
  }
  .target-name.ok  { color: var(--green);  text-shadow: 0 0 24px rgba(52,211,153,0.5); }
  .target-name.bad { color: var(--red);    text-shadow: 0 0 24px rgba(248,113,113,0.5); }
  .target-ko   { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-top: 2px; }
  .target-freq { font-family: 'IBM Plex Mono', monospace; font-size: 0.76rem; color: var(--text-dim); margin-top: 4px; }
  .target-oct  { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--accent); margin-top: 2px; }

  .btn-replay {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
    padding: 7px 16px; background: transparent; border: 1.5px solid var(--border);
    border-radius: 20px; color: var(--text-dim);
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.8rem;
    cursor: pointer; transition: all 0.18s;
  }
  .btn-replay:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(192,132,252,0.07); }
  .btn-replay:active { transform: scale(0.95); }
  .btn-replay.playing { border-color: var(--accent); color: var(--accent); animation: rglow 0.6s ease-in-out infinite alternate; }
  @keyframes rglow { from{box-shadow:none} to{box-shadow:0 0 10px rgba(124,106,247,0.4)} }

  /* Hit circles */
  .hits-row { display: flex; align-items: center; gap: 10px; }
  .hits-label { font-size: 0.72rem; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
  .hit-circles { display: flex; gap: 8px; }
  .hc {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1.5px solid var(--border); background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem; font-family: 'IBM Plex Mono', monospace;
    color: var(--text-dim); transition: all 0.2s;
  }
  .hc.filled { background: rgba(52,211,153,0.15); border-color: var(--green); color: var(--green); font-weight: 700; }
  .hc.cur { border-color: var(--accent); box-shadow: 0 0 8px rgba(124,106,247,0.4); animation: hcpulse 0.9s ease-in-out infinite; }
  @keyframes hcpulse { 0%,100%{box-shadow:0 0 4px rgba(124,106,247,0.25)} 50%{box-shadow:0 0 12px rgba(124,106,247,0.6)} }

  /* Sustain bar */
  .sustain-wrap { display: flex; flex-direction: column; gap: 5px; }
  .sustain-top { display: flex; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--text-dim); }
  .sustain-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .sustain-fill { height: 100%; width: 0%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--green)); transition: width 0.08s linear; }
  .sustain-fill.done { background: var(--green); }

  /* Detected bar */
  .det-bar {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 16px; min-height: 50px;
  }
  .det-lbl { font-size: 0.7rem; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; white-space: nowrap; }
  .det-note { font-family: 'IBM Plex Mono', monospace; font-size: 1.25rem; font-weight: 700; color: var(--text-dim); min-width: 56px; transition: color 0.1s; }
  .det-note.match { color: var(--green); }
  .det-note.close { color: var(--yellow); }
  .det-note.wrong { color: var(--red); }
  .det-cents { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--text-dim); }

  /* Complete */
  .complete {
    display: none; text-align: center; padding: 36px 20px;
    background: linear-gradient(135deg, rgba(52,211,153,0.05), rgba(124,106,247,0.05));
    border-top: 1px solid var(--border);
  }
  .complete.show { display: block; }
  .complete-icon { font-size: 3.5rem; margin-bottom: 10px; }
  .complete-title { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--green); }
  .complete-sub { font-size: 0.82rem; color: var(--text-dim); margin-top: 6px; }
  .btn-retry {
    margin-top: 18px; padding: 10px 28px;
    background: transparent; border: 1.5px solid var(--green);
    border-radius: 20px; color: var(--green);
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem;
    cursor: pointer; transition: all 0.18s;
  }
  .btn-retry:hover { background: rgba(52,211,153,0.1); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 20px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 16px; font-size: 0.8rem; color: var(--text);
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 100; max-width: 300px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: var(--red); }
  .toast.success { border-color: var(--green); }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-mark">🎹</div>
    <div>
      <h1>음계 트레이너</h1>
      <div class="subtitle">도(C3) ~ 도(C6) · 3옥타브 · 3번 정답 통과</div>
    </div>
  </header>

  <button class="btn-start" id="btnStart" onclick="toggleTrainer()">
    <span class="start-dot"></span>
    <span id="btnStartText">연습 시작하기</span>
  </button>

  <div class="panel" id="panel">

    <!-- Piano keyboard -->
    <div class="keyboard-wrap">
      <div class="keyboard" id="keyboard"></div>
    </div>

    <div class="panel-body">

      <!-- Progress dots -->
      <div class="prog-dots" id="progDots"></div>

      <!-- Target card with nav -->
      <div class="target-card">
        <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">◀</button>
        <div class="target-center">
          <div class="target-name" id="targetName">—</div>
          <div class="target-ko"   id="targetKo">—</div>
          <div class="target-freq" id="targetFreq">— Hz</div>
          <div class="target-oct"  id="targetOct"></div>
          <button class="btn-replay" id="btnReplay" onclick="replayTone()">🔊 다시 듣기</button>
        </div>
        <button class="nav-btn" id="btnNext" onclick="navigate(1)">▶</button>
      </div>

      <!-- Hit circles -->
      <div class="hits-row">
        <span class="hits-label">정답 횟수</span>
        <div class="hit-circles" id="hitCircles"></div>
      </div>

      <!-- Sustain bar -->
      <div class="sustain-wrap">
        <div class="sustain-top">
          <span>음 유지 시간 (2초 유지 = 1회 정답)</span>
          <span id="sustainPct">0%</span>
        </div>
        <div class="sustain-track">
          <div class="sustain-fill" id="sustainFill"></div>
        </div>
      </div>

      <!-- Detected note -->
      <div class="det-bar">
        <span class="det-lbl">감지된 음</span>
        <span class="det-note" id="detNote">—</span>
        <span class="det-cents" id="detCents"></span>
      </div>

    </div>

    <!-- Complete screen -->
    <div class="complete" id="completeScreen">
      <div class="complete-icon">🎉</div>
      <div class="complete-title">음계 완주!</div>
      <div class="complete-sub" id="completeSub"></div>
      <button class="btn-retry" onclick="restartTrainer()">🔄 다시 시작</button>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══ 음계 데이터 C3~C6 ═══════════════════════════════════
const KO    = {C:'도','C#':'도#',D:'레','D#':'레#',E:'미',F:'파','F#':'파#',G:'솔','G#':'솔#',A:'라','A#':'라#',B:'시'};
const SEMIS = {C:0,'C#':1,D:2,'D#':3,E:4,F:5,'F#':6,G:7,'G#':8,A:9,'A#':10,B:11};
const REQUIRED = 3;       // 정답 3회면 다음 음
const SUSTAIN_MS = 2000;  // 2초 유지 = 1회 정답
const HIT_CENTS  = 60;    // ±60¢ 허용

const SCALE = [];
for (let oct = 3; oct <= 6; oct++) {
  const steps = oct < 6
    ? ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B']
    : ['C'];
  for (const n of steps) {
    const midi = (oct + 1) * 12 + SEMIS[n];
    SCALE.push({
      name: n, octave: oct, ko: KO[n],
      freq: 440 * Math.pow(2, (midi - 69) / 12),
      isBlack: n.includes('#')
    });
  }
}

// ═══ State ════════════════════════════════════════════════
let active = false, micStream = null, audioCtx = null, analyser = null, rafId = null;
let curIdx = 0, hits = 0, totalOk = 0, totalFail = 0;
let sustainStart = null, sustainAcc = 0;

// ═══ Toast ════════════════════════════════════════════════
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  clearTimeout(el._t); el._t = setTimeout(() => el.className = 'toast', 3400);
}

// ═══ Start / Stop ═════════════════════════════════════════
async function toggleTrainer() {
  active ? stopTrainer() : await startTrainer();
}

async function startTrainer() {
  if (!navigator.mediaDevices?.getUserMedia) {
    toast('이 브라우저는 마이크를 지원하지 않아요.', 'error'); return;
  }
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError')
      toast('마이크 권한을 허용해주세요. 🔒 → 마이크 → 허용 후 새로고침', 'error');
    else if (e.name === 'NotFoundError')
      toast('마이크를 찾을 수 없어요.', 'error');
    else
      toast('마이크 오류: ' + e.name, 'error');
    return;
  }

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 4096;
  analyser.smoothingTimeConstant = 0.3;
  audioCtx.createMediaStreamSource(micStream).connect(analyser);

  active = true; curIdx = 0; hits = 0; totalOk = 0; totalFail = 0;
  sustainStart = null; sustainAcc = 0;

  document.getElementById('btnStart').classList.add('active');
  document.getElementById('btnStartText').textContent = '연습 종료';
  document.getElementById('panel').classList.add('show');
  document.getElementById('completeScreen').classList.remove('show');

  buildKeyboard(); buildDots(); gotoNote(0); loop();
}

function stopTrainer() {
  active = false;
  if (rafId) cancelAnimationFrame(rafId);
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  document.getElementById('btnStart').classList.remove('active');
  document.getElementById('btnStartText').textContent = '연습 시작하기';
  document.getElementById('panel').classList.remove('show');
}

function restartTrainer() {
  curIdx = 0; hits = 0; totalOk = 0; totalFail = 0;
  sustainStart = null; sustainAcc = 0;
  document.getElementById('completeScreen').classList.remove('show');
  buildDots(); gotoNote(0);
  if (active) loop();
}

// ═══ Build UI ═════════════════════════════════════════════
function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  SCALE.forEach((n, i) => {
    const k = document.createElement('div');
    k.className = 'piano-key' + (n.isBlack ? ' black-key' : '');
    k.id = 'key_' + i;
    k.innerHTML = `<span class="key-label">${n.name}</span><span class="key-ko">${n.ko}</span>`;
    k.addEventListener('click', () => { if (active) gotoNote(i); });
    kb.appendChild(k);
  });
}

function buildDots() {
  document.getElementById('progDots').innerHTML =
    SCALE.map((_, i) => `<div class="pdot" id="pd_${i}"></div>`).join('');
}

function refreshDots() {
  SCALE.forEach((_, i) => {
    const d = document.getElementById('pd_' + i);
    if (d) d.className = 'pdot' + (i < curIdx ? ' done' : i === curIdx ? ' cur' : '');
  });
}

function refreshKeys() {
  SCALE.forEach((n, i) => {
    const k = document.getElementById('key_' + i);
    if (!k) return;
    k.className = 'piano-key' + (n.isBlack ? ' black-key' : '')
      + (i < curIdx ? ' is-done' : i === curIdx ? ' is-current' : '');
  });
  const cur = document.getElementById('key_' + curIdx);
  if (cur) cur.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function renderHits() {
  document.getElementById('hitCircles').innerHTML =
    Array.from({ length: REQUIRED }, (_, i) => {
      const cls = i < hits ? 'hc filled' : i === hits ? 'hc cur' : 'hc';
      const txt = i < hits ? '✓' : i + 1;
      return `<div class="${cls}">${txt}</div>`;
    }).join('');
}

// ═══ Navigate ═════════════════════════════════════════════
function navigate(dir) {
  const next = curIdx + dir;
  if (next >= 0 && next < SCALE.length) gotoNote(next);
}

function gotoNote(idx) {
  curIdx = Math.max(0, Math.min(SCALE.length - 1, idx));
  hits = 0; sustainStart = null; sustainAcc = 0;

  const n = SCALE[curIdx];
  document.getElementById('targetName').textContent = n.name;
  document.getElementById('targetName').className   = 'target-name';
  document.getElementById('targetKo').textContent   = n.ko;
  document.getElementById('targetFreq').textContent = n.freq.toFixed(2) + ' Hz';
  document.getElementById('targetOct').textContent  = n.octave + '옥타브';

  document.getElementById('btnPrev').disabled = curIdx === 0;
  document.getElementById('btnNext').disabled = curIdx === SCALE.length - 1;

  document.getElementById('detNote').textContent  = '—';
  document.getElementById('detNote').className    = 'det-note';
  document.getElementById('detCents').textContent = '';
  setSustain(0);
  renderHits(); refreshDots(); refreshKeys();
  playTone(n.freq);
}

// ═══ Sustain bar ══════════════════════════════════════════
function setSustain(ms) {
  const pct = Math.min(100, (ms / SUSTAIN_MS) * 100);
  const f = document.getElementById('sustainFill');
  f.style.width = pct + '%';
  f.className = 'sustain-fill' + (pct >= 100 ? ' done' : '');
  document.getElementById('sustainPct').textContent = Math.round(pct) + '%';
}

// ═══ Reference tone (1.5s — 2× 원본) ════════════════════
function playTone(freq) {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = 'sine';
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.28, ctx.currentTime + 0.06);
    gain.gain.linearRampToValueAtTime(0.22, ctx.currentTime + 0.9);
    gain.gain.linearRampToValueAtTime(0,    ctx.currentTime + 1.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 1.55);
    osc.onended = () => ctx.close();
  } catch(e) {}
}

function replayTone() {
  if (curIdx >= SCALE.length) return;
  const btn = document.getElementById('btnReplay');
  btn.classList.add('playing'); btn.textContent = '🔊 재생 중...';
  playTone(SCALE[curIdx].freq);
  setTimeout(() => { btn.classList.remove('playing'); btn.textContent = '🔊 다시 듣기'; }, 1600);
}

// ═══ YIN pitch detection ══════════════════════════════════
function detectPitch(buf, sr) {
  const half = 2048, yin = new Float32Array(half);
  for (let t = 0; t < half; t++) {
    let s = 0;
    for (let j = 0; j < half; j++) { const d = buf[j] - buf[j + t]; s += d * d; }
    yin[t] = s;
  }
  yin[0] = 1; let rs = 0;
  for (let t = 1; t < half; t++) { rs += yin[t]; yin[t] *= t / rs; }
  for (let t = 2; t < half; t++) {
    if (yin[t] < 0.15) {
      while (t + 1 < half && yin[t+1] < yin[t]) t++;
      const a = yin[t-1] ?? yin[t], b = yin[t], c = yin[t+1] ?? yin[t];
      return sr / (t + (c - a) / (2 * (2*b - c - a)));
    }
  }
  return -1;
}

function freqToNote(freq) {
  if (freq <= 0) return null;
  const midi = 69 + 12 * Math.log2(freq / 440);
  const r    = Math.round(midi);
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  return { name: names[((r % 12) + 12) % 12], octave: Math.floor(r / 12) - 1, cents: Math.round((midi - r) * 100) };
}

// ═══ Main loop ════════════════════════════════════════════
function loop() {
  if (!active) return;
  rafId = requestAnimationFrame(loop);

  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  const rms = Math.sqrt(buf.reduce((s, v) => s + v * v, 0) / buf.length);

  if (rms < 0.006) {
    if (sustainStart !== null) { sustainAcc = 0; sustainStart = null; setSustain(0); }
    document.getElementById('detNote').textContent  = '—';
    document.getElementById('detNote').className    = 'det-note';
    document.getElementById('detCents').textContent = '';
    return;
  }

  const freq = detectPitch(buf, audioCtx.sampleRate);
  if (freq < 60 || freq > 2000) return;

  const info = freqToNote(freq);
  if (!info) return;

  const target = SCALE[curIdx];
  const cents  = Math.round(1200 * Math.log2(freq / target.freq));
  const isMatch = info.name === target.name && info.octave === target.octave && Math.abs(cents) <= HIT_CENTS;
  const isClose = Math.abs(cents) <= HIT_CENTS * 2 && info.name === target.name;

  // Detected display
  const detEl = document.getElementById('detNote');
  detEl.textContent = info.name + info.octave;
  detEl.className   = 'det-note' + (isMatch ? ' match' : isClose ? ' close' : ' wrong');
  document.getElementById('detCents').textContent = isMatch ? '✓' : (cents > 0 ? '+' : '') + cents + '¢';

  const now = performance.now();

  if (isMatch) {
    if (sustainStart === null) sustainStart = now;
    sustainAcc = (now - sustainStart);
    setSustain(sustainAcc);

    if (sustainAcc >= SUSTAIN_MS) {
      // ✅ 1회 정답!
      sustainStart = null; sustainAcc = 0; setSustain(0);
      hits++; totalOk++;
      renderHits();

      // key flash green
      const k = document.getElementById('key_' + curIdx);
      if (k) {
        k.classList.remove('is-current'); k.classList.add('is-success');
        setTimeout(() => { k.classList.remove('is-success'); k.classList.add('is-current'); }, 380);
      }
      flashName('ok');

      if (hits >= REQUIRED) {
        // 3회 달성 → 다음 음
        setTimeout(() => {
          if (curIdx + 1 >= SCALE.length) finishTrainer();
          else gotoNote(curIdx + 1);
        }, 450);
      }
    }
  } else {
    // 틀린 음 — sustain 리셋
    if (sustainStart !== null) {
      sustainStart = null; sustainAcc = 0; setSustain(0);
      totalFail++;
      const k = document.getElementById('key_' + curIdx);
      if (k) {
        k.classList.add('is-fail');
        setTimeout(() => { k.classList.remove('is-fail'); k.classList.add('is-current'); }, 300);
      }
      flashName('bad');
    }
  }
}

function flashName(cls) {
  const el = document.getElementById('targetName');
  el.classList.add(cls);
  setTimeout(() => el.classList.remove(cls), 380);
}

// ═══ Finish ═══════════════════════════════════════════════
function finishTrainer() {
  active = false;
  if (rafId) cancelAnimationFrame(rafId);
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();

  document.getElementById('btnStart').classList.remove('active');
  document.getElementById('btnStartText').textContent = '연습 시작하기';
  document.getElementById('completeSub').textContent =
    `${SCALE.length}음 완주! 성공 ${totalOk}회 / 실패 ${totalFail}회`;
  document.getElementById('completeScreen').classList.add('show');

  SCALE.forEach((n, i) => {
    const k = document.getElementById('key_' + i);
    if (k) k.className = 'piano-key' + (n.isBlack ? ' black-key' : '') + ' is-done';
  });
  document.querySelectorAll('.pdot').forEach(d => d.className = 'pdot done');
}
</script>
